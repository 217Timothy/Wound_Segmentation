# ---------------------------------------------------------------------------
# Batch inference on folders of images.
# Run:  python scripts/predict.py --config configs/predict.yaml
# ---------------------------------------------------------------------------

# which checkpoint: outputs/checkpoints/<version>/<run_name>/best.pt
# (or set 'ckpt' to an explicit path)
version: tkr-finetune-v1
run_name: exp_ablation_imagenet_only

datasets: [TKR_Knee]
in_root: data/raw/segmentation
out_root: outputs

threshold: 0.5

# morphological clean-up of the predicted masks
postprocess: true
blur_kernel: 9
closing_kernel: 9
open_kernel: 5
min_area: 200
keep_largest: true
