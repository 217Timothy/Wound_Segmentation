# =========================
# Dataset
# =========================
version: wound-finetune-v1
run_name: run1
datasets: [DFU, Cut, Laceration]

# =========================
# Finetune
# =========================
pretrained_ckpt: checkpoints/v3/run1/best.pt

# =========================
# Training
# =========================
epochs: 50
batch_size: 4
num_workers: 4

# =========================
# Optimizer
# =========================
lr: 1e-5

# =========================
# Strategy
# =========================
freeze_epochs: 10
